{% extends 'base.html' %}

{% block content %}
<div class="container py-4" style="padding-bottom:100px;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Most frequently eaten recipes</h2>
  </div>

  <canvas id="usageChart" width="800" height="300"></canvas>

</div>

<div style="position:fixed; left:0; right:0; bottom:16px; display:flex; justify-content:center; pointer-events:auto;">
  <a class="btn btn-primary" href="{{ url_for('selected_recipes') }}">Back</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  (function(){
    const data = JSON.parse('{{ data|tojson|escape }}');
    const labels = data.map(d => d.name);
    const values = data.map(d => d.times_used);

    const ctx = document.getElementById('usageChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Times eaten',
          data: values,
          backgroundColor: 'rgba(54, 162, 235, 0.85)'
        }]
      },
      options: {
          responsive: true,
          scales: {
            y: { 
              beginAtZero: true,
              ticks: {
                // force whole numbers (no decimals)
                stepSize: 1,
                callback: function(value) { return Number.isInteger(value) ? value : '' }
              }
            }
          }
        }
    });
  })();
</script>

{% endblock %}
